name: ci

on:
  push:
  pull_request:

jobs:
  learning-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: python3 -m json.tool schemas/agentic-learning.schema.json >/dev/null
      - run: python3 -m json.tool learning/ml-kem-fips203.track.json >/dev/null
      - run: python3 -m json.tool learning/ml-dsa-fips204.track.json >/dev/null
      - run: python3 -m json.tool fixtures/parameter-sets.json >/dev/null

  rust-crate-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-rust-crate-gate.sh

  docs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-docs-glossary.sh

  vectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: python3 scripts/check-vector-manifest.py --self-test

  cpp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cmake -S cpp -B build/cpp -DPQCORE_BUILD_TESTS=ON
      - run: cmake --build build/cpp
      - run: ctest --test-dir build/cpp --output-on-failure
